<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小三中文：《遊子吟》過關大挑戰</title>
    <style>
        body {
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "Microsoft JhengHei", "PingFang HK", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .game-container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 800px;
            width: 100%;
            margin-bottom: 40px;
        }
        h1 { color: #d35400; margin-bottom: 5px; font-size: 28px; }
        h2 { color: #2980b9; margin-top: 0; border-bottom: 2px dashed #bdc3c7; padding-bottom: 10px; font-size: 22px; }
        p { font-size: 18px; color: #555; }
        
        /* 通用按鈕與訊息 */
        .action-btn { background-color: #2980b9; color: white; border: none; padding: 12px 25px; font-size: 20px; border-radius: 10px; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 0 #1f618d; transition: 0.1s;}
        .action-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #1f618d; }
        .message { margin-top: 15px; font-size: 22px; font-weight: bold; min-height: 30px; }
        #success-img { display: none; max-width: 250px; margin: 20px auto 0; animation: pop 0.5s ease-out; }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* 第一關 & 第四關 共用：選擇題風格 */
        .options-container { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .option-btn { background-color: #ecf0f1; color: #2c3e50; border: 2px solid #bdc3c7; padding: 15px 20px; font-size: 20px; border-radius: 10px; cursor: pointer; width: 90%; text-align: left; transition: 0.2s; }
        .option-btn:hover { background-color: #d4e6f1; border-color: #3498db; }
        .option-btn.correct { background-color: #27ae60; color: white; border-color: #2ecc71; }
        .option-btn.wrong { background-color: #e74c3c; color: white; border-color: #c0392b; }
        
        /* 第一關：圖文配對專用 */
        .match-img { max-height: 250px; max-width: 100%; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }

        /* 第二關 & 第三關 共用：字詞庫 */
        .word-bank { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; min-height: 50px; }
        .piece { background-color: #f39c12; color: white; padding: 10px 20px; border-radius: 10px; font-size: 22px; cursor: pointer; user-select: none; box-shadow: 0 4px 0 #e67e22; transition: 0.1s; }
        .piece:active { transform: translateY(4px); box-shadow: 0 0 0 #e67e22; }

        /* 第二關：填充題專用 */
        .fill-sentence { font-size: 28px; font-weight: bold; color: #2c3e50; margin: 20px 0; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 5px; }
        .fill-slot { width: 45px; height: 45px; border: 3px dashed #bdc3c7; border-radius: 8px; display: inline-flex; justify-content: center; align-items: center; cursor: pointer; background-color: #f9f9f9; color: #c0392b; }
        .fill-slot.filled { border: 3px solid #2980b9; background-color: #ebf5fb; }

        /* 第三關：重組專用 */
        .answer-area { display: flex; flex-direction: column; gap: 10px; align-items: center; margin-bottom: 20px; }
        .slot-long { width: 80%; height: 50px; border: 3px dashed #bdc3c7; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 22px; cursor: pointer; background-color: #f9f9f9; }
        .slot-long.filled { border: 3px solid #27ae60; background-color: #eafaf1; }

        /* 第四關：裝飾圖 */
        .activity-img { max-width: 150px; height: auto; margin: 10px 0; }
        .quiz-question { font-size: 22px; font-weight: bold; color: #2c3e50; margin: 20px 0; }
    </style>
</head>
<body>

<div class="game-container" id="level1">
    <h1>第一關：看圖識詩句</h1>
    <h2>圖文配對</h2>
    <p>請看下方的圖片，選出最配合的詩句。</p>
    <div id="match-container"></div>
    <div class="message" id="msg1"></div>
    <button class="action-btn" id="nextMatchBtn" style="display:none;" onclick="nextMatch()">下一題</button>
</div>

<div class="game-container" id="level2">
    <h1>第二關：火眼金睛</h1>
    <h2>字詞填充</h2>
    <p>點擊下方的字，填入句子的空格中。</p>
    <div id="fill-container"></div>
    <button class="action-btn" id="checkFillBtn" onclick="checkFill()">檢查答案</button>
    <button class="action-btn" id="nextFillBtn" style="display:none;" onclick="nextFill()">下一題</button>
    <div class="message" id="msg2"></div>
</div>

<div class="game-container" id="level3">
    <h1>第三關：幫幫孟母</h1>
    <h2>詩句重組</h2>
    <p>請點擊上方的詩句，把它們排成正確的順序！</p>
    
    <div class="word-bank" id="wordBank3"></div>
    <div class="answer-area" id="answerArea3">
        <div class="slot-long" data-index="0"></div>
        <div class="slot-long" data-index="1"></div>
        <div class="slot-long" data-index="2"></div>
        <div class="slot-long" data-index="3"></div>
        <div class="slot-long" data-index="4"></div>
        <div class="slot-long" data-index="5"></div>
    </div>
    <button class="action-btn" id="btn3" onclick="checkOrder()">檢查答案</button>
    <div class="message" id="msg3"></div>
</div>

<div class="game-container" id="level4">
    <h1>第四關：詩意大考驗</h1>
    <h2>意譯選擇題</h2>
    <img src="activity.png" alt="活動圖片" class="activity-img" onerror="this.style.display='none'">
    
    <div id="quiz-container"></div>
    <div class="message" id="msg4"></div>
    <button class="action-btn" id="nextQuizBtn" style="display:none;" onclick="nextQuiz()">下一題</button>
    
    <div id="final-reward" style="display:none; text-align:center; margin-top:20px;">
        <h2 style="color:#27ae60; font-size:28px;">恭喜你！完成所有挑戰！</h2>
        <img src="success.png" id="success-img" alt="恭喜過關">
    </div>
</div>

<script>
    /* 通用打亂陣列函數 */
    function shuffle(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    /* ================= 第一關邏輯 (圖文配對) ================= */
    const matchData = [
        { img: "match1.png", opts: ["慈母手中線", "意恐遲遲歸", "誰言寸草心"], ans: 0 },
        { img: "match2.png", opts: ["遊子身上衣", "報得三春暉", "臨行密密縫"], ans: 1 }
    ];
    let mIdx = 0;

    function renderMatch() {
        const container = document.getElementById('match-container');
        container.innerHTML = '';
        if (mIdx >= matchData.length) { 
            container.innerHTML = '<h3 style="color:#27ae60;">第一關完成！請向下捲動挑戰第二關 ⬇️</h3>'; 
            return; 
        }
        
        const data = matchData[mIdx];
        container.innerHTML = `<img src="${data.img}" class="match-img" alt="配對圖片" onerror="this.outerHTML='<div style=\\'padding:40px; background:#eee; border-radius:10px; margin-bottom:15px;\\'>[請在此放入 ${data.img}]</div>'">`;
        
        const optsDiv = document.createElement('div'); optsDiv.className = 'options-container';
        data.opts.forEach((opt, i) => {
            const btn = document.createElement('button'); btn.className = 'option-btn'; btn.style.textAlign = 'center'; btn.textContent = opt;
            btn.onclick = () => {
                const allBtns = optsDiv.querySelectorAll('.option-btn');
                allBtns.forEach(b => b.onclick = null);
                if (i === data.ans) {
                    btn.classList.add('correct'); document.getElementById('msg1').textContent = "配對成功！"; document.getElementById('msg1').style.color = "#27ae60";
                } else {
                    btn.classList.add('wrong'); allBtns[data.ans].classList.add('correct');
                    document.getElementById('msg1').textContent = "不太對喔，再仔細看看！"; document.getElementById('msg1').style.color = "#c0392b";
                }
                document.getElementById('nextMatchBtn').style.display = 'inline-block';
            };
            optsDiv.appendChild(btn);
        });
        container.appendChild(optsDiv);
    }
    function nextMatch() { mIdx++; document.getElementById('msg1').textContent = ''; document.getElementById('nextMatchBtn').style.display = 'none'; renderMatch(); }
    renderMatch();

    /* ================= 第二關邏輯 (火眼金睛填充) ================= */
    const fillData = [
        { parts: ["臨行", "縫"], ans: ["密", "密"], bank: ["密", "遲", "寸", "心", "密", "春"] },
        { parts: ["意恐", "歸"], ans: ["遲", "遲"], bank: ["密", "遲", "歸", "遲", "草", "暉"] }
    ];
    let fIdx = 0;
    let currentFillAnswers = [];

    function renderFill() {
        const container = document.getElementById('fill-container');
        container.innerHTML = '';
        document.getElementById('msg2').textContent = '';
        document.getElementById('checkFillBtn').style.display = 'inline-block';
        document.getElementById('nextFillBtn').style.display = 'none';

        if (fIdx >= fillData.length) { 
            container.innerHTML = '<h3 style="color:#27ae60;">第二關完成！請向下捲動挑戰第三關 ⬇️</h3>'; 
            document.getElementById('checkFillBtn').style.display = 'none';
            return; 
        }

        const data = fillData[fIdx];
        currentFillAnswers = new Array(data.ans.length).fill(null);

        const sentenceDiv = document.createElement('div');
        sentenceDiv.className = 'fill-sentence';
        
        data.parts.forEach((part, index) => {
            const textSpan = document.createElement('span'); textSpan.textContent = part;
            sentenceDiv.appendChild(textSpan);
            if (index < data.parts.length - 1) {
                for(let i=0; i<data.ans.length; i++){
                    const slot = document.createElement('div');
                    slot.className = 'fill-slot';
                    slot.dataset.idx = i;
                    sentenceDiv.appendChild(slot);
                }
            }
        });
        container.appendChild(sentenceDiv);

        const bankDiv = document.createElement('div');
        bankDiv.className = 'word-bank';
        shuffle(data.bank).forEach(char => createFillChar(char, bankDiv));
        container.appendChild(bankDiv);
    }

    function createFillChar(char, bankDiv) {
        const p = document.createElement('div');
        p.className = 'piece'; p.textContent = char;
        p.onclick = () => {
            const emptyIdx = currentFillAnswers.findIndex(ans => ans === null);
            if (emptyIdx !== -1) {
                currentFillAnswers[emptyIdx] = char;
                const slot = document.querySelector(`.fill-slot[data-idx="${emptyIdx}"]`);
                slot.textContent = char; slot.classList.add('filled');
                slot.onclick = () => {
                    currentFillAnswers[emptyIdx] = null;
                    slot.textContent = ''; slot.classList.remove('filled'); slot.onclick = null;
                    createFillChar(char, document.querySelector('#fill-container .word-bank'));
                };
                p.remove();
            }
        };
        bankDiv.appendChild(p);
    }

    function checkFill() {
        const data = fillData[fIdx];
        const msg = document.getElementById('msg2');
        if (currentFillAnswers.includes(null)) { msg.textContent = "請把空格填滿喔！"; msg.style.color = "#e67e22"; return; }
        
        let isCorrect = currentFillAnswers.every((val, i) => val === data.ans[i]);
        if (isCorrect) {
            msg.textContent = "完全正確！火眼金睛！"; msg.style.color = "#27ae60";
            document.getElementById('checkFillBtn').style.display = 'none';
            document.getElementById('nextFillBtn').style.display = 'inline-block';
            document.querySelectorAll('.fill-slot').forEach(s => s.onclick = null);
        } else {
            msg.textContent = "好像有錯字喔，點擊紅字退回再試試！"; msg.style.color = "#c0392b";
        }
    }
    function nextFill() { fIdx++; renderFill(); }
    renderFill();

    /* ================= 第三關邏輯 (重組) ================= */
    const orderData = ["慈母手中線", "遊子身上衣", "臨行密密縫", "意恐遲遲歸", "誰言寸草心", "報得三春暉"];
    let answers3 = new Array(6).fill(null);
    const slots3 = document.querySelectorAll('#level3 .slot-long');
    const bank3 = document.getElementById('wordBank3');

    shuffle(orderData).forEach(word => createPiece3(word));

    function createPiece3(word) {
        const p = document.createElement('div');
        p.className = 'piece'; p.textContent = word;
        p.onclick = () => {
            const emptyIdx = answers3.findIndex(ans => ans === null);
            if (emptyIdx !== -1) {
                answers3[emptyIdx] = word;
                slots3[emptyIdx].textContent = word;
                slots3[emptyIdx].classList.add('filled');
                slots3[emptyIdx].onclick = () => {
                    answers3[emptyIdx] = null;
                    slots3[emptyIdx].textContent = '';
                    slots3[emptyIdx].classList.remove('filled');
                    slots3[emptyIdx].onclick = null;
                    createPiece3(word);
                };
                p.remove();
            }
        };
        bank3.appendChild(p);
    }

    function checkOrder() {
        const msg = document.getElementById('msg3');
        if (answers3.includes(null)) { msg.textContent = "請填滿所有空格！"; msg.style.color = "#e67e22"; return; }
        if (answers3.every((val, i) => val === orderData[i])) {
            msg.textContent = "太棒了！請向下捲動挑戰最後一關 ⬇️"; msg.style.color = "#27ae60";
            document.getElementById('btn3').style.display = 'none';
        } else {
            msg.textContent = "順序不對喔，點擊錯誤詩句退回再試！"; msg.style.color = "#c0392b";
        }
    }

    /* ================= 第四關邏輯 (選擇題) ================= */
    const quizData = [
        { q: "「臨行密密縫」是什麼意思？", opts: ["A. 離開前匆匆忙忙縫衣服", "B. 臨走前，母親一針一線細密地縫補", "C. 衣服破了密密麻麻的洞"], ans: 1 },
        { q: "「意恐遲遲歸」中，母親擔心什麼？", opts: ["A. 擔心兒子太晚起床", "B. 擔心兒子忘記帶衣服", "C. 擔心兒子很晚才回家"], ans: 2 }
    ];
    let qIdx = 0;

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = '';
        
        if (qIdx >= quizData.length) { 
            document.getElementById('final-reward').style.display = 'block'; 
            document.getElementById('success-img').style.display = 'inline';
            return; 
        }
        
        const data = quizData[qIdx];
        const qDiv = document.createElement('div');
        qDiv.className = 'quiz-question';
        qDiv.textContent = `${qIdx+1}. ${data.q}`;
        container.appendChild(qDiv);

        const optsDiv = document.createElement('div'); optsDiv.className = 'options-container';
        data.opts.forEach((opt, i) => {
            const btn = document.createElement('button'); btn.className = 'option-btn'; btn.textContent = opt;
            btn.onclick = () => {
                const allBtns = optsDiv.querySelectorAll('.option-btn');
                allBtns.forEach(b => b.onclick = null);
                if (i === data.ans) {
                    btn.classList.add('correct'); document.getElementById('msg4').textContent = "答對了！"; document.getElementById('msg4').style.color = "#27ae60";
                } else {
                    btn.classList.add('wrong'); allBtns[data.ans].classList.add('correct');
                    document.getElementById('msg4').textContent = "答錯了，正確答案是綠色的選項。"; document.getElementById('msg4').style.color = "#c0392b";
                }
                document.getElementById('nextQuizBtn').style.display = 'inline-block';
            };
            optsDiv.appendChild(btn);
        });
        container.appendChild(optsDiv);
    }
    
    function nextQuiz() { qIdx++; document.getElementById('msg4').textContent = ''; document.getElementById('nextQuizBtn').style.display = 'none'; renderQuiz(); }
    renderQuiz();

</script>
</body>
</html>
